<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Heat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            font-size: 14px;
            line-height: 1.5;
            min-height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .screen {
            display: none;
            padding: 20px;
            padding-bottom: 40px;
            min-height: 100vh;
            overflow-y: auto;
        }

        .screen.active {
            display: block;
        }

        /* Red Flash Overlay */
        #flashOverlay {
            position: fixed;
            inset: 0;
            background: #ef4444;
            opacity: 0;
            pointer-events: none;
            z-index: 9998;
            transition: opacity 0.1s;
        }

        #flashOverlay.flash {
            animation: flashAnim 0.6s ease-out;
        }

        @keyframes flashAnim {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        /* Debug */
        #debug {
            position: fixed;
            bottom: 8px;
            left: 8px;
            right: 8px;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 11px;
            font-family: monospace;
            color: #4ade80;
            z-index: 9999;
            display: none;
        }

        #debug.show {
            display: block;
        }

        #debug.error {
            color: #f87171;
            border-color: #f87171;
        }

        /* Logo */
        .logo {
            text-align: center;
            padding: 32px 0;
        }

        .logo-mark {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: #fff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-mark span {
            font-size: 28px;
            font-weight: 800;
            color: #0a0a0a;
            letter-spacing: -2px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        /* Card */
        .card {
            background: #141414;
            border: 1px solid #252525;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        /* Form */
        .label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #888;
            margin-bottom: 8px;
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input:focus {
            border-color: #fff;
        }

        .input::placeholder {
            color: #555;
        }

        .input-code {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-family: monospace;
        }

        /* Modes */
        .modes {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode {
            flex: 1;
            padding: 18px 12px;
            background: #0a0a0a;
            border: 2px solid #252525;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode:hover {
            border-color: #444;
        }

        .mode.selected {
            border-color: #fff;
            background: #1a1a1a;
        }

        .mode-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .mode-desc {
            font-size: 11px;
            color: #666;
        }

        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #fff;
            color: #0a0a0a;
        }

        .btn-primary:hover {
            background: #e5e5e5;
        }

        .btn-secondary {
            background: #1f1f1f;
            color: #fff;
            border: 1px solid #333;
        }

        .btn-secondary:hover {
            background: #2a2a2a;
        }

        .btn-danger {
            background: #1f1f1f;
            color: #f87171;
            border: 1px solid #3f1f1f;
        }

        .btn-danger:hover {
            background: #2a1a1a;
        }

        .btn-success {
            background: #166534;
            color: #fff;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn-row .btn {
            flex: 1;
        }

        .btn-sm {
            padding: 12px 16px;
            font-size: 13px;
        }

        /* Top Bar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #141414;
            border: 1px solid #252525;
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f87171;
        }

        .status-dot.on {
            background: #4ade80;
        }

        .topbar-name {
            font-size: 14px;
            font-weight: 500;
        }

        .room-code {
            font-family: monospace;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            background: #252525;
            padding: 6px 12px;
            border-radius: 6px;
        }

        /* Camera */
        .camera-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
            aspect-ratio: 4/3;
        }

        .camera-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            color: #666;
            font-size: 13px;
            gap: 12px;
        }

        .camera-loading.hide {
            display: none;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Detection Zone */
        #zone {
            position: absolute;
            border: 2px solid #fff;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            cursor: move;
            touch-action: none;
            display: none;
        }

        #zone.detected {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .zone-label {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #0a0a0a;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        #zone.detected .zone-label {
            background: #f87171;
            color: #fff;
        }

        .zone-handle {
            position: absolute;
            bottom: -6px;
            right: -6px;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            border: 2px solid #0a0a0a;
            cursor: se-resize;
        }

        #zone.detected .zone-handle {
            background: #f87171;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat {
            flex: 1;
            background: #141414;
            border: 1px solid #252525;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .stat-value.success { color: #4ade80; }
        .stat-value.danger { color: #f87171; }

        .stat-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Controls */
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #141414;
            border: 1px solid #252525;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .control-label {
            font-size: 13px;
            font-weight: 500;
        }

        .toggle {
            width: 44px;
            height: 24px;
            background: #333;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle.on {
            background: #4ade80;
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle.on::after {
            transform: translateX(20px);
        }

        /* Slider */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #141414;
            border: 1px solid #252525;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .slider-row label {
            font-size: 13px;
            font-weight: 500;
            color: #888;
        }

        .slider {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            -webkit-appearance: none;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-value {
            font-size: 13px;
            font-weight: 600;
            min-width: 40px;
            text-align: right;
            font-family: monospace;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #141414;
            border: 1px solid #252525;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #252525;
            color: #fff;
        }

        .tab-badge {
            display: inline-block;
            background: #f87171;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 6px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Live Feed */
        .live-container {
            position: relative;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .live-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .live-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 13px;
            gap: 8px;
        }

        .live-placeholder.hide {
            display: none;
        }

        .live-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #f87171;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            display: none;
        }

        .live-indicator.show {
            display: block;
        }

        .live-name {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            display: none;
        }

        .live-name.show {
            display: block;
        }

        /* Alerts List */
        .alert-card {
            background: #141414;
            border: 1px solid #252525;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .alert-img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            cursor: pointer;
        }

        .alert-body {
            padding: 14px;
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .alert-name {
            font-size: 15px;
            font-weight: 600;
        }

        .alert-room {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .alert-time {
            font-size: 11px;
            color: #666;
            background: #0a0a0a;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #444;
        }

        .empty-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .empty-desc {
            font-size: 12px;
        }

        /* Connection */
        .conn-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: #0a0a0a;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
            color: #666;
        }

        /* Image Viewer */
        .viewer {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .viewer.show {
            display: flex;
        }

        .viewer-header {
            padding: 16px;
            text-align: right;
        }

        .viewer-close {
            width: 40px;
            height: 40px;
            background: #252525;
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }

        .viewer-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .viewer-body img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
        }

        /* Hidden */
        #captureCan, #streamCan, #alertCan {
            display: none;
        }

        .mt-16 { margin-top: 16px; }
    </style>
</head>
<body>

<!-- Red Flash Overlay -->
<div id="flashOverlay"></div>

<!-- Debug -->
<div id="debug"></div>

<!-- Image Viewer -->
<div class="viewer" id="viewer">
    <div class="viewer-header">
        <button class="viewer-close" onclick="closeViewer()">×</button>
    </div>
    <div class="viewer-body">
        <img id="viewerImg" src="" alt="">
    </div>
</div>

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
    <div class="logo">
        <div class="logo-mark">
            <span>H</span>
        </div>
        <h1>Heat</h1>
        <p>Motion Detection</p>
    </div>

    <div class="card">
        <label class="label">Name</label>
        <input type="text" class="input" id="nameInput" placeholder="Enter your name">

        <label class="label">Mode</label>
        <div class="modes">
            <div class="mode selected" id="modeSender" onclick="pickMode('sender')">
                <div class="mode-title">Sender</div>
                <div class="mode-desc">Camera & detect</div>
            </div>
            <div class="mode" id="modeReceiver" onclick="pickMode('receiver')">
                <div class="mode-title">Receiver</div>
                <div class="mode-desc">View & alerts</div>
            </div>
        </div>

        <button class="btn btn-primary" onclick="startApp()">Start</button>
    </div>
</div>

<!-- SENDER -->
<div class="screen" id="senderScreen">
    <div class="topbar">
        <div class="topbar-left">
            <div class="status-dot" id="senderDot"></div>
            <span class="topbar-name" id="senderNameDisplay">User</span>
        </div>
        <div class="room-code" id="roomCodeDisplay">------</div>
    </div>

    <div class="camera-container" id="cameraBox">
        <div class="camera-loading" id="camLoading">
            <div class="spinner"></div>
            <span>Starting camera...</span>
        </div>
        <video id="vid" autoplay playsinline muted></video>
        <div id="zone">
            <span class="zone-label">Detection</span>
            <div class="zone-handle" id="zoneHandle"></div>
        </div>
    </div>
    <canvas id="captureCan"></canvas>
    <canvas id="streamCan"></canvas>
    <canvas id="alertCan"></canvas>

    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="alertCnt">0</div>
            <div class="stat-label">Alerts</div>
        </div>
        <div class="stat">
            <div class="stat-value success" id="statusText">--</div>
            <div class="stat-label">Status</div>
        </div>
        <div class="stat">
            <div class="stat-value danger" id="streamText">ON</div>
            <div class="stat-label">Stream</div>
        </div>
    </div>

    <div class="control-row">
        <span class="control-label">Live Stream</span>
        <div class="toggle on" id="streamTog" onclick="togStream()"></div>
    </div>

    <div class="slider-row">
        <label>Sensitivity</label>
        <input type="range" class="slider" id="sensSlider" min="5" max="80" value="30">
        <span class="slider-value" id="sensVal">30%</span>
    </div>

    <div class="btn-row">
        <button class="btn btn-secondary btn-sm" onclick="copyCode()">Copy Code</button>
        <button class="btn btn-danger btn-sm" onclick="endApp()">End</button>
    </div>
</div>

<!-- RECEIVER -->
<div class="screen" id="receiverScreen">
    <div class="card">
        <label class="label">Room Code</label>
        <input type="text" class="input input-code" id="codeInput" placeholder="------" maxlength="6">
        <button class="btn btn-success" onclick="joinRoom()">Connect</button>
        <div class="conn-status">
            <div class="status-dot" id="recvDot"></div>
            <span id="connText">Not connected</span>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" id="tabLive" onclick="switchTab('live')">Live</div>
        <div class="tab" id="tabHistory" onclick="switchTab('history')">
            History
            <span class="tab-badge" id="historyBadge">0</span>
        </div>
    </div>

    <!-- Live Tab -->
    <div class="tab-content active" id="liveTab">
        <div class="live-container">
            <img id="liveImg" src="" alt="">
            <div class="live-placeholder" id="livePH">
                <span>Waiting for stream...</span>
            </div>
            <div class="live-indicator" id="liveBadge">LIVE</div>
            <div class="live-name" id="liveName">---</div>
        </div>
    </div>

    <!-- History Tab -->
    <div class="tab-content" id="historyTab">
        <div id="alertsBox">
            <div class="empty-state">
                <div class="empty-title">No alerts</div>
                <div class="empty-desc">Motion alerts appear here</div>
            </div>
        </div>
    </div>

    <button class="btn btn-danger mt-16" onclick="endApp()">Disconnect</button>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>
// Debug
function log(msg, isError) {
    console.log(msg);
    var d = document.getElementById('debug');
    d.textContent = msg;
    d.className = 'show' + (isError ? ' error' : '');
    setTimeout(function() { d.className = ''; }, 3000);
}

// State
var state = {
    mode: 'sender',
    name: '',
    room: '',
    connected: false,
    alerts: [],
    alertCnt: 0,
    sens: 30,
    lastAlert: 0,
    cooldown: 2500,
    camOK: false,
    streaming: true,
    lastStream: 0,
    padding: 60
};

var zone = { x: 40, y: 40, w: 100, h: 100, drag: false, resize: false, ox: 0, oy: 0 };
var mqttClient = null;
var videoEl = null;
var mediaStream = null;
var prevFrame = null;
var rafId = null;

// Flash screen red
function flashRed() {
    var overlay = document.getElementById('flashOverlay');
    overlay.classList.remove('flash');
    // Trigger reflow
    void overlay.offsetWidth;
    overlay.classList.add('flash');
}

// Switch tabs
function switchTab(tab) {
    document.getElementById('tabLive').classList.toggle('active', tab === 'live');
    document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
    document.getElementById('liveTab').classList.toggle('active', tab === 'live');
    document.getElementById('historyTab').classList.toggle('active', tab === 'history');
}

// Show screen
function showScreen(id) {
    log('Screen: ' + id);
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) {
        screens[i].classList.remove('active');
    }
    document.getElementById(id).classList.add('active');
}

// Pick mode
function pickMode(m) {
    state.mode = m;
    document.getElementById('modeSender').classList.toggle('selected', m === 'sender');
    document.getElementById('modeReceiver').classList.toggle('selected', m === 'receiver');
}

// Generate code
function makeCode() {
    var c = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    var code = '';
    for (var i = 0; i < 6; i++) {
        code += c.charAt(Math.floor(Math.random() * c.length));
    }
    return code;
}

// Start
function startApp() {
    log('Starting...');
    
    try {
        var nameEl = document.getElementById('nameInput');
        var name = nameEl.value.trim();
        
        if (!name) {
            log('Enter name', true);
            alert('Please enter your name');
            nameEl.focus();
            return;
        }
        
        state.name = name;
        
        if (state.mode === 'sender') {
            state.room = makeCode();
            log('Room: ' + state.room);
            initSender();
        } else {
            initReceiver();
        }
    } catch (err) {
        log('Error: ' + err.message, true);
    }
}

// Sender
function initSender() {
    showScreen('senderScreen');
    document.getElementById('senderNameDisplay').textContent = state.name;
    document.getElementById('roomCodeDisplay').textContent = state.room;
    
    startCamera();
    
    var slider = document.getElementById('sensSlider');
    var val = document.getElementById('sensVal');
    slider.oninput = function() {
        state.sens = parseInt(this.value);
        val.textContent = this.value + '%';
    };
    
    connectMQTT();
}

function startCamera() {
    log('Camera init...');
    videoEl = document.getElementById('vid');
    
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        log('Camera not supported', true);
        document.getElementById('camLoading').innerHTML = '<span>Camera not supported</span>';
        return;
    }
    
    navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
    })
    .then(function(stream) {
        log('Camera OK');
        mediaStream = stream;
        videoEl.srcObject = stream;
        
        videoEl.onloadedmetadata = function() {
            videoEl.play().then(function() {
                log('Video playing');
                document.getElementById('camLoading').classList.add('hide');
                state.camOK = true;
                document.getElementById('statusText').textContent = 'OK';
                setupZone();
                runDetection();
            }).catch(function(e) {
                log('Play error: ' + e.message, true);
            });
        };
    })
    .catch(function(err) {
        log('Camera error: ' + err.message, true);
        document.getElementById('camLoading').innerHTML = '<span>Camera error</span>';
    });
}

// Zone
function setupZone() {
    var z = document.getElementById('zone');
    var h = document.getElementById('zoneHandle');
    var box = document.getElementById('cameraBox');
    var rect = box.getBoundingClientRect();
    
    zone.x = (rect.width - zone.w) / 2;
    zone.y = (rect.height - zone.h) / 2;
    updateZone();
    z.style.display = 'block';
    
    z.onpointerdown = function(e) {
        if (e.target === h) return;
        zone.drag = true;
        zone.ox = e.clientX - zone.x;
        zone.oy = e.clientY - zone.y;
        z.setPointerCapture(e.pointerId);
    };
    
    h.onpointerdown = function(e) {
        e.stopPropagation();
        zone.resize = true;
        zone.ox = e.clientX;
        zone.oy = e.clientY;
        h.setPointerCapture(e.pointerId);
    };
    
    document.onpointermove = function(e) {
        var rect = box.getBoundingClientRect();
        if (zone.drag) {
            zone.x = Math.max(0, Math.min(e.clientX - zone.ox, rect.width - zone.w));
            zone.y = Math.max(30, Math.min(e.clientY - zone.oy, rect.height - zone.h));
            updateZone();
        }
        if (zone.resize) {
            zone.w = Math.max(50, zone.w + e.clientX - zone.ox);
            zone.h = Math.max(50, zone.h + e.clientY - zone.oy);
            zone.ox = e.clientX;
            zone.oy = e.clientY;
            updateZone();
        }
    };
    
    document.onpointerup = function() {
        zone.drag = false;
        zone.resize = false;
    };
}

function updateZone() {
    var z = document.getElementById('zone');
    z.style.left = zone.x + 'px';
    z.style.top = zone.y + 'px';
    z.style.width = zone.w + 'px';
    z.style.height = zone.h + 'px';
}

// Detection
function runDetection() {
    if (!mediaStream || !state.camOK) {
        rafId = requestAnimationFrame(runDetection);
        return;
    }
    
    var cap = document.getElementById('captureCan');
    var ctx = cap.getContext('2d', { willReadFrequently: true });
    var strm = document.getElementById('streamCan');
    var sctx = strm.getContext('2d');
    
    var vw = videoEl.videoWidth;
    var vh = videoEl.videoHeight;
    
    if (!vw) {
        rafId = requestAnimationFrame(runDetection);
        return;
    }
    
    cap.width = vw;
    cap.height = vh;
    ctx.drawImage(videoEl, 0, 0);
    
    // Stream
    var now = Date.now();
    if (state.streaming && state.connected && now - state.lastStream > 200) {
        state.lastStream = now;
        strm.width = 200;
        strm.height = 150;
        sctx.drawImage(videoEl, 0, 0, 200, 150);
        try {
            mqttClient.publish('heat/live/' + state.room, JSON.stringify({
                t: 's', p: state.name, f: strm.toDataURL('image/jpeg', 0.25)
            }));
        } catch (e) {}
    }
    
    // Motion detection
    var box = document.getElementById('cameraBox').getBoundingClientRect();
    var sx = vw / box.width;
    var sy = vh / box.height;
    
    var zx = Math.max(0, Math.floor(zone.x * sx));
    var zy = Math.max(0, Math.floor(zone.y * sy));
    var zw = Math.min(Math.floor(zone.w * sx), vw - zx);
    var zh = Math.min(Math.floor(zone.h * sy), vh - zy);
    
    if (zw < 10 || zh < 10) {
        rafId = requestAnimationFrame(runDetection);
        return;
    }
    
    var frame = ctx.getImageData(zx, zy, zw, zh);
    var zel = document.getElementById('zone');
    
    if (prevFrame && prevFrame.data.length === frame.data.length) {
        var diff = getDiff(prevFrame.data, frame.data);
        var thresh = 90 - state.sens;
        
        if (diff > thresh) {
            zel.classList.add('detected');
            document.getElementById('statusText').textContent = 'MOTION';
            document.getElementById('statusText').className = 'stat-value danger';
            fireAlert(ctx, vw, vh, zx, zy, zw, zh);
        } else {
            zel.classList.remove('detected');
            document.getElementById('statusText').textContent = 'OK';
            document.getElementById('statusText').className = 'stat-value success';
        }
    }
    
    prevFrame = frame;
    rafId = requestAnimationFrame(runDetection);
}

function getDiff(a, b) {
    var cnt = 0;
    var total = a.length / 4;
    var step = 8;
    for (var i = 0; i < a.length; i += 4 * step) {
        var d = Math.abs(a[i] - b[i]) + Math.abs(a[i+1] - b[i+1]) + Math.abs(a[i+2] - b[i+2]);
        if (d / 3 > 25) cnt++;
    }
    return (cnt / (total / step)) * 100;
}

function fireAlert(ctx, vw, vh, zx, zy, zw, zh) {
    var now = Date.now();
    if (now - state.lastAlert < state.cooldown) return;
    state.lastAlert = now;
    state.alertCnt++;
    document.getElementById('alertCnt').textContent = state.alertCnt;
    
    // Capture with padding
    var pad = state.padding;
    var cx = Math.max(0, zx - pad);
    var cy = Math.max(0, zy - pad);
    var cw = Math.min(zw + pad * 2, vw - cx);
    var ch = Math.min(zh + pad * 2, vh - cy);
    
    var alertCan = document.getElementById('alertCan');
    alertCan.width = cw;
    alertCan.height = ch;
    var actx = alertCan.getContext('2d');
    
    var capCan = document.getElementById('captureCan');
    actx.drawImage(capCan, cx, cy, cw, ch, 0, 0, cw, ch);
    
    var img = alertCan.toDataURL('image/jpeg', 0.75);
    
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    
    if (mqttClient && state.connected) {
        log('Alert sent');
        mqttClient.publish('heat/alert/' + state.room, JSON.stringify({
            t: 'a',
            p: state.name,
            r: state.room,
            tm: new Date().toLocaleTimeString(),
            i: img
        }));
    }
}

// Stream toggle
function togStream() {
    state.streaming = !state.streaming;
    document.getElementById('streamTog').classList.toggle('on', state.streaming);
    document.getElementById('streamText').textContent = state.streaming ? 'ON' : 'OFF';
}

// MQTT
function connectMQTT() {
    log('MQTT connecting...');
    
    if (typeof mqtt === 'undefined') {
        log('MQTT not loaded', true);
        return;
    }
    
    var id = 'heat_' + Math.random().toString(36).substr(2, 8);
    
    try {
        mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
            clientId: id,
            clean: true,
            reconnectPeriod: 3000
        });
        
        mqttClient.on('connect', function() {
            log('MQTT connected');
            state.connected = true;
            var sd = document.getElementById('senderDot');
            var rd = document.getElementById('recvDot');
            if (sd) sd.classList.add('on');
            if (rd) rd.classList.add('on');
            
            if (state.mode === 'receiver' && state.room) {
                mqttClient.subscribe('heat/alert/' + state.room);
                mqttClient.subscribe('heat/live/' + state.room);
                document.getElementById('connText').textContent = 'Connected: ' + state.room;
            }
        });
        
        mqttClient.on('error', function(err) {
            log('MQTT error', true);
        });
        
        mqttClient.on('close', function() {
            state.connected = false;
            var sd = document.getElementById('senderDot');
            var rd = document.getElementById('recvDot');
            if (sd) sd.classList.remove('on');
            if (rd) rd.classList.remove('on');
        });
        
        mqttClient.on('message', function(topic, msg) {
            try {
                var d = JSON.parse(msg.toString());
                if (d.t === 's') showLive(d);
                else if (d.t === 'a') showAlert(d);
            } catch (e) {}
        });
    } catch (err) {
        log('MQTT error: ' + err.message, true);
    }
}

// Receiver
function initReceiver() {
    showScreen('receiverScreen');
}

function joinRoom() {
    var code = document.getElementById('codeInput').value.trim().toUpperCase();
    if (code.length !== 6) {
        alert('Enter 6 character code');
        return;
    }
    state.room = code;
    log('Joining: ' + code);
    connectMQTT();
}

function showLive(d) {
    document.getElementById('liveImg').src = d.f;
    document.getElementById('livePH').classList.add('hide');
    document.getElementById('liveBadge').classList.add('show');
    document.getElementById('liveName').textContent = d.p;
    document.getElementById('liveName').classList.add('show');
}

function showAlert(d) {
    log('Alert from: ' + d.p);
    
    // Flash screen red
    flashRed();
    
    // Vibrate
    if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200, 100, 200]);
    }
    
    // Play sound
    playBeep();
    
    // Add to history
    state.alerts.unshift(d);
    renderAlerts();
    
    // Notification
    if (Notification.permission === 'granted') {
        new Notification('Heat: Motion', { body: d.p + ' - ' + d.r });
    } else if (Notification.permission !== 'denied') {
        Notification.requestPermission();
    }
}

function renderAlerts() {
    var box = document.getElementById('alertsBox');
    var badge = document.getElementById('historyBadge');
    badge.textContent = state.alerts.length;
    
    if (!state.alerts.length) {
        box.innerHTML = '<div class="empty-state"><div class="empty-title">No alerts</div><div class="empty-desc">Motion alerts appear here</div></div>';
        return;
    }
    
    var html = '';
    for (var i = 0; i < state.alerts.length; i++) {
        var a = state.alerts[i];
        html += '<div class="alert-card">' +
            '<img class="alert-img" src="' + a.i + '" onclick="viewImg(' + i + ')">' +
            '<div class="alert-body">' +
                '<div class="alert-header">' +
                    '<div><div class="alert-name">' + a.p + '</div><div class="alert-room">Room: ' + a.r + '</div></div>' +
                    '<div class="alert-time">' + a.tm + '</div>' +
                '</div>' +
                '<div class="btn-row">' +
                    '<button class="btn btn-secondary btn-sm" onclick="dismiss(' + i + ')">Dismiss</button>' +
                    '<button class="btn btn-primary btn-sm" onclick="viewImg(' + i + ')">View</button>' +
                '</div>' +
            '</div>' +
        '</div>';
    }
    box.innerHTML = html;
}

function dismiss(i) {
    state.alerts.splice(i, 1);
    renderAlerts();
}

function viewImg(i) {
    document.getElementById('viewerImg').src = state.alerts[i].i;
    document.getElementById('viewer').classList.add('show');
}

function closeViewer() {
    document.getElementById('viewer').classList.remove('show');
}

function playBeep() {
    try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.3;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
        osc.stop(ctx.currentTime + 0.25);
    } catch (e) {}
}

// Utils
function copyCode() {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(state.room).then(function() {
            log('Copied: ' + state.room);
        });
    } else {
        prompt('Code:', state.room);
    }
}

function endApp() {
    log('Ending...');
    
    if (mediaStream) {
        var tracks = mediaStream.getTracks();
        for (var i = 0; i < tracks.length; i++) {
            tracks[i].stop();
        }
        mediaStream = null;
    }
    
    if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
    }
    
    if (mqttClient) {
        mqttClient.end();
        mqttClient = null;
    }
    
    prevFrame = null;
    state.connected = false;
    state.camOK = false;
    state.alertCnt = 0;
    state.alerts = [];
    
    var zoneEl = document.getElementById('zone');
    if (zoneEl) zoneEl.style.display = 'none';
    
    var camLoad = document.getElementById('camLoading');
    if (camLoad) {
        camLoad.classList.remove('hide');
        camLoad.innerHTML = '<div class="spinner"></div><span>Starting camera...</span>';
    }
    
    var livePH = document.getElementById('livePH');
    if (livePH) livePH.classList.remove('hide');
    
    var liveBadge = document.getElementById('liveBadge');
    if (liveBadge) liveBadge.classList.remove('show');
    
    var liveName = document.getElementById('liveName');
    if (liveName) liveName.classList.remove('show');
    
    showScreen('loginScreen');
}

window.onbeforeunload = function() {
    if (mediaStream) {
        var tracks = mediaStream.getTracks();
        for (var i = 0; i < tracks.length; i++) {
            tracks[i].stop();
        }
    }
    if (mqttClient) mqttClient.end();
};

log('Ready');
</script>
